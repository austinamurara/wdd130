<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description" content="Get in touch with White Water Rafting for premier expeditions through the Grand Canyon.">
    <meta name="author" content="Austina Murara">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="images/river-guide-logo.png" alt="White Water Rafting Logo" class="logo">
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1 class="contact-title">Contact Us</h1>

        <section class="contact-details">
            <div class="company-info">
                <h2>Visit Our Grand Canyon Base</h2>
                <p>📍 1000 Rim View Drive, Arizona, USA</p>
                <p>📞 +1 (928) 555-0199</p>
                <p>✉️ adventures@whitewaterrafting.com</p>
                
                <div class="map-container">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3235.532358055655!2d-112.1275!3d36.056!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x873312ae759b9611%3A0x204f56749907470!2sGrand%20Canyon%20National%20Park!5e0!3m2!1sen!2sus!4v1712423000000!5m2!1sen!2sus" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </section>

        <section class="team">
            <h2>Meet Our Adventure Experts</h2>
            <div class="employee-profiles">
                <figure>
                    <img src="images/employee1.jpg" alt="Alex Riverton">
                    <figcaption><strong>Alex Riverton</strong><br>Expedition Manager</figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.jpg" alt="Sarah Splash">
                    <figcaption><strong>Sarah Splash</strong><br>Senior River Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.jpg" alt="Buck Oarman">
                    <figcaption><strong>Buck Oarman</strong><br>Rapid Safety Expert</figcaption>
                </figure>
            </div>
        </section>

        <section class="contact-form">
            <h2>Connect With Our Team</h2>
            <form action="#" method="post">
                <label for="username">Full Name:</label>
                <input type="text" id="username" name="username" required>

                <label for="useremail">Email Address:</label>
                <input type="email" id="useremail" name="useremail" required>

                <fieldset>
                    <legend>How Can We Help?</legend>
                    <label><input type="radio" id="general" name="purpose" value="general"> General Inquiry</label>
                    <label><input type="radio" id="reservation" name="purpose" value="reservation"> Booking a Trip</label>
                    <label><input type="radio" id="suggestion" name="purpose" value="suggestion"> Feedback</label>
                </fieldset>

                <label for="message">Your Message:</label>
                <textarea id="message" name="message" rows="5" placeholder="Tell us about your next adventure..."></textarea>

                <label class="newsletter-check">
                    <input type="checkbox" id="subscribe" name="subscribe"> I'd like to receive seasonal adventure updates
                </label>

                <button type="submit" class="submit-button">Submit Request</button>
            </form>
        </section>
    </main>

   <footer>
    <p>©2026 | Rafting Site | Austina Murara | WDD 130</p>
    <nav class="sociallinks">
        <a href="https://facebook.com" target="_blank">
            <img src="images/facebook.png" alt="Facebook icon">
        </a>
        <a href="https://linkedin.com" target="_blank">
            <img src="images/linkedin.png" alt="LinkedIn icon">
        </a>
        <a href="https://instagram.com" target="_blank">
            <img src="images/instagram.png" alt="Instagram icon">
        </a>
    </nav>
</footer>
</body>
</html>
